name: Deploy to cPanel

on:
  push:
    branches:
      - main

jobs:
  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18.x'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - name: Install Dependencies
        run: npm ci
      - name: Audit Dependencies
        run: |
          # Run audit and capture output
          set +e
          AUDIT_OUTPUT=$(npm audit --json 2>&1)
          AUDIT_EXIT=$?
          set -e
          
          # Parse vulnerability counts by severity
          CRITICAL=$(echo "$AUDIT_OUTPUT" | node -e "
            const data = JSON.parse(require('fs').readFileSync('/dev/stdin','utf8'));
            const v = data.metadata?.vulnerabilities || {};
            console.log(v.critical || 0);
          " 2>/dev/null || echo "0")
          
          echo "Audit exit code: $AUDIT_EXIT"
          echo "Critical vulnerabilities: $CRITICAL"
          npm audit --audit-level=critical 2>&1 || true
          
          # Fail only on critical vulnerabilities
          # Remaining high/moderate are pinned inside react-scripts@5.0.1 (CRA toolchain)
          # and cannot be resolved without migrating off CRA
          if [ "$CRITICAL" -gt 0 ]; then
            echo "::error::Critical vulnerabilities found!"
            exit 1
          fi
          
          echo "✅ No critical vulnerabilities. Known react-scripts advisories are tracked."

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18.x'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - name: Install Dependencies
        run: npm ci
      - name: TypeScript Check
        run: npx tsc --noEmit

  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    needs: [secret-scan, audit, typecheck]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18.x'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - name: Install Dependencies
        run: npm ci
      - name: Build React App
        run: npm run build
        env:
          REACT_APP_PUBLIC_POSTHOG_KEY: ${{ secrets.REACT_APP_PUBLIC_POSTHOG_KEY }}
          REACT_APP_PUBLIC_POSTHOG_HOST: ${{ secrets.REACT_APP_PUBLIC_POSTHOG_HOST }}
          REACT_APP_GOOGLE_MAPS_API_KEY: ${{ secrets.REACT_APP_GOOGLE_MAPS_API_KEY }}
          REACT_APP_META_PIXEL_ID: ${{ secrets.REACT_APP_META_PIXEL_ID }}
          REACT_APP_SMOOBU_URL: ${{ secrets.REACT_APP_SMOOBU_URL }}
          REACT_APP_HOUSE_CODES: ${{ secrets.REACT_APP_HOUSE_CODES }}
      - name: Generate PHP config from secrets
        run: |
          cat > build/smoobu-config.php << 'PHPEOF'
          <?php
          define('WEBHOOK_SECRET', getenv('SMOOBU_WEBHOOK_SECRET'));
          define('POSTHOG_API_KEY', getenv('POSTHOG_API_KEY'));
          define('POSTHOG_HOST',    'https://us.i.posthog.com');
          PHPEOF
          # Inject actual secret values
          sed -i "s|getenv('SMOOBU_WEBHOOK_SECRET')|'$SMOOBU_WEBHOOK_SECRET'|g" build/smoobu-config.php
          sed -i "s|getenv('POSTHOG_API_KEY')|'$POSTHOG_API_KEY'|g" build/smoobu-config.php
        env:
          SMOOBU_WEBHOOK_SECRET: ${{ secrets.SMOOBU_WEBHOOK_SECRET }}
          POSTHOG_API_KEY: ${{ secrets.POSTHOG_API_KEY }}
      - name: Upload to cPanel
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          local-dir: ./build/
          server-dir: /public_html/
          exclude: |
            **/.git**
            **/.git*/
            **/node_modules/**
            **/.*
